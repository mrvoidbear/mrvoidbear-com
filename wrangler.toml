# Cloudflare Workers (Astro + @astrojs/cloudflare).
# After `bun run build`, deploy with: `bun run deploy` (uses `dist/server/wrangler.json`).
#
# https://docs.astro.build/en/guides/integrations-guide/cloudflare/

name = "mrvoidbear-com"
compatibility_date = "2025-11-01"
# Session driver (lru-cache) and some dependencies expect Node.js APIs in the worker bundle.
compatibility_flags = [ "nodejs_compat" ]
